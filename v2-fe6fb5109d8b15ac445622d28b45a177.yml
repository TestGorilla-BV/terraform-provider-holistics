            dimension in the order-by clause.
          type: string
        field:
          type: string
        transformation:
          description: >-
            The transformation that will be applied on the field when processing
            the condition.
          type: string
          nullable: true
          enum:
            - datetrunc year
            - datetrunc quarter
            - datetrunc month
            - datetrunc week
            - datetrunc day
            - datetrunc hour
            - datetrunc minute
