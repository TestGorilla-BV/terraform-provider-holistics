                      type: string
                      nullable: true
                    job_title:
                      description: User job title.
                      type: string
                      nullable: true
                    role:
                      allOf:
                        - $ref: '#/components/schemas/UserRole'
                    allow_authentication_token:
                      description: Allow User to have API access.
                      type: boolean
                    enable_export_data:
                      description: >-
                        [(Enterprise feature) Allow/disallow exporting
                        data](/docs/user-management#enterprise-feature-allowdisallow-exporting-data).
                      type: boolean
                    group_ids:
                      description: List of new Group ids that the User will be assigned to.
                      type: array
                      items:
                        type: integer
                    settings:
                      allOf:
                        - $ref: '#/components/schemas/UserSettings'
      responses:
        '200':
          description: The updated User.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
        '422':
          $ref: '#/components/responses/InvalidOperationError'
    delete:
      operationId: Users_Delete
      summary: Delete a User (soft-delete)
      description: >-
        Revoke a User from accessing and using Holistics. <br/>Note: The
        soft-deleted User will still retain ownership of their resources. You
        can contact support@holistics.io to request for an ownership transfer.
      tags:
        - Users
      responses:
        '200':
          description: User was deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          description: You don't have permission to delete user.
          $ref: '#/components/responses/PermissionDeniedError'
        '404':
          description: User not found.
          $ref: '#/components/responses/NotFoundError'
        '422':
          description: User not permitted to self-destruction.
          $ref: '#/components/responses/InvalidParametersError'
