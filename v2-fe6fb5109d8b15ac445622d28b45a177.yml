openapi: 3.0.2
info:
  title: Holistics API
  version: '2.0'
  description: >
    Using these APIs, you can programmatically work with Holistics - retrieve
    report data, trigger schedules, manage users, and more.


    For setup instructions, see the [Getting Started
    guide](/api/v2/getting-started).
  contact:
    name: Holistics Support
    email: support@holistics.io
servers:
  - url: https://secure.holistics.io/api/v2
    description: APAC-region API
  - url: https://us.holistics.io/api/v2
    description: US-region API
  - url: https://eu.holistics.io/api/v2
    description: EU-region API
security:
  - ApiKeyAuthentication: []
components:
  securitySchemes:
    ApiKeyAuthentication:
      type: apiKey
      in: header
      name: X-Holistics-Key
    BearerAuth:
      type: http
      scheme: bearer
      description: OAuth 2.1 Bearer token authentication
  schemas:
    _ExampleArrayQueryParam:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
          description: |
            IDs of the objects that you want to list
        names:
          type: array
          items:
            type: string
          description: |
            Names of the objects that you want to list
        limit:
          type: integer
    _BaseError:
      $ref: '#/components/schemas/BaseError'
    _RecordError:
      $ref: '#/components/schemas/RecordError'
    _DataModelingCondition:
      $ref: '#/components/schemas/Condition'
    _DataSetQuery:
      $ref: '#/components/schemas/Query'
    Schedule:
      type: object
      properties:
        repeat:
          type: string
          description: >
            Crontab expression. Example: `0 4 * * *` will start a job at 4:00

            AM everyday. You can check your crontab expression by using
            https://crontab.guru.


            We recommend that you should change the `repeat` time to prevent
            anti-spam filter from your email provider.

            For example `0 4 * * *` (job start at 4:00 AM) could be `1 4 * * *`
            (job start at 4:01 AM) or `5 4 * * *`(job start at 4:05 AM).

            This will also help your database does not get overload when there
            are many email schedules that execute at the same time.
        paused:
          type: boolean
          description: Pause execution temporarily.
        is_archived:
          type: boolean
          description: The schedule is paused because the associated dashboard is archived.
          readOnly: true
      required:
        - repeat
        - paused
    ConditionValue:
      anyOf:
        - type: string
        - type: boolean
        - type: number
    Condition:
      title: DataModelingCondition
      type: object
      description: >-
        Condition that can be applied on the Data Modeling layer to filter your
        data.
      properties:
        modifier:
          type: string
          nullable: true
        operator:
          type: string
        values:
          type: array
          items:
            $ref: '#/components/schemas/ConditionValue'
      discriminator:
        propertyName: operator
        mapping:
          is: '#/components/schemas/Is'
          is_not: '#/components/schemas/IsNot'
          is_null: '#/components/schemas/IsNull'
          not_null: '#/components/schemas/NotNull'
          greater_than: '#/components/schemas/GreaterThan'
          less_than: '#/components/schemas/LessThan'
          between: '#/components/schemas/Between'
          matches_user_attribute: '#/components/schemas/MatchesUserAttribute'
          contains: '#/components/schemas/Contains'
          does_not_contain: '#/components/schemas/DoesNotContain'
          starts_with: '#/components/schemas/StartsWith'
          ends_with: '#/components/schemas/EndsWith'
          is_true: '#/components/schemas/IsTrue'
          is_false: '#/components/schemas/IsFalse'
          last: '#/components/schemas/Last'
          next: '#/components/schemas/Next'
          before: '#/components/schemas/Before'
          after: '#/components/schemas/After'
          matches: '#/components/schemas/Matches'
          transform_pop_relative: '#/components/schemas/TransformPopRelative'
          transform_pop_absolute: '#/components/schemas/TransformPopAbsolute'
          transform_pop_none: '#/components/schemas/TransformPopNone'
          transform_date_drill: '#/components/schemas/TransformDateDrill'
          none: '#/components/schemas/None'
      required:
        - operator
        - values
    Is:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
          example:
            operator: is
            values:
              - Alice
              - Bob
        - $ref: '#/components/schemas/Condition'
    IsNot:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
          example:
            operator: is_not
            values:
              - Alice
              - Bob
        - $ref: '#/components/schemas/Condition'
    IsNull:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 0
              maxItems: 0
          example:
            operator: is_null
            values: []
        - $ref: '#/components/schemas/Condition'
    NotNull:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 0
              maxItems: 0
          example:
            operator: not_null
            values: []
        - $ref: '#/components/schemas/Condition'
    GreaterThan:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 1
              maxItems: 1
          example:
            operator: greater_than
            values:
              - 3
        - $ref: '#/components/schemas/Condition'
    LessThan:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 1
              maxItems: 1
          example:
            operator: less_than
            values:
              - 3
        - $ref: '#/components/schemas/Condition'
    Between:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 2
              maxItems: 2
          example:
            operator: between
            values:
              - 3
              - 5
        - $ref: '#/components/schemas/Condition'
    MatchesUserAttribute:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 1
          example:
            operator: matches_user_attribute
            values:
              - h_email
        - $ref: '#/components/schemas/Condition'
    Contains:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 1
          example:
            operator: contains
            values:
              - a
              - b
        - $ref: '#/components/schemas/Condition'
    DoesNotContain:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 1
          example:
            operator: does_not_contain
            values:
              - a
              - b
        - $ref: '#/components/schemas/Condition'
    StartsWith:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 1
          example:
            operator: starts_with
            values:
              - a
              - b
        - $ref: '#/components/schemas/Condition'
    EndsWith:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 1
          example:
            operator: ends_with
            values:
              - a
              - b
        - $ref: '#/components/schemas/Condition'
    IsTrue:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 0
              maxItems: 0
          example:
            operator: is_true
            values: []
        - $ref: '#/components/schemas/Condition'
    IsFalse:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 0
              maxItems: 0
          example:
            operator: is_false
            values: []
        - $ref: '#/components/schemas/Condition'
    DateTime:
      type: string
      enum:
        - year
        - quarter
        - month
        - week
        - day
        - hour
        - minute
    Last:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 1
              maxItems: 1
            modifier:
              $ref: '#/components/schemas/DateTime'
          example:
            operator: last
            values:
              - 2
            modifier: day
        - $ref: '#/components/schemas/Condition'
    Next:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 1
              maxItems: 1
            modifier:
              $ref: '#/components/schemas/DateTime'
          example:
            operator: next
            values:
              - 2
            modifier: day
        - $ref: '#/components/schemas/Condition'
    Before:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 1
              maxItems: 1
          example:
            operator: before
            values:
              - 2020-03-21
        - $ref: '#/components/schemas/Condition'
    After:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 1
              maxItems: 1
          example:
            operator: after
            values:
              - 2020-03-21
        - $ref: '#/components/schemas/Condition'
    Matches:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 1
              maxItems: 1
          example:
            operator: matches
            values:
              - last 3 days
        - $ref: '#/components/schemas/Condition'
    TransformPopRelative:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 1
              maxItems: 1
            modifier:
              $ref: '#/components/schemas/DateTime'
          example:
            operator: transform_pop_relative
            values:
              - 1
            modifier: year
        - $ref: '#/components/schemas/Condition'
    TransformPopAbsolute:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 2
              maxItems: 2
          example:
            operator: transform_pop_absolute
            values:
              - 2020-07-05
              - 2021-02-19
            modifier: year
        - $ref: '#/components/schemas/Condition'
    TransformPopNone:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 0
              maxItems: 0
          example:
            operator: transform_pop_none
            values: null
        - $ref: '#/components/schemas/Condition'
    TransformDateDrill:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 1
              maxItems: 1
          example:
            operator: transform_date_drill
            values:
              - datetrunc month
        - $ref: '#/components/schemas/Condition'
    None:
      type: object
      allOf:
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/ConditionValue'
              minItems: 0
              maxItems: 0
          example:
            operator: none
            values: []
        - type: object
          properties:
            operator:
              type: string
              description: >-
                None condition applied. This Condition will be skipped and have
                no effect on the exploration.
        - $ref: '#/components/schemas/Condition'
    DynamicFilterPreset:
      type: object
      properties:
        id:
          type: integer
        dynamic_filter_id:
          anyOf:
            - type: string
            - type: integer
        preset_condition:
          $ref: '#/components/schemas/Condition'
        public_hidden:
          type: boolean
          default: false
          description: >-
            (Only available in Shareable Links)


            Whether the associated filter should be hidden to public users.


            Note: This is an UI-only setting and should not be used for
            permission control.
          nullable: true
      required:
        - dynamic_filter_id
        - preset_condition
    DataScheduleEmailDest:
      type: object
      allOf:
        - type: object
          properties:
            title:
              type: string
              nullable: true
              description: >-
                Email subject. In default, source title will be used if title is
                not available. Dynamic title: [Dynamic
                Variables](/docs/delivery/email-schedules/#dynamic-variables).
            recipients:
              type: array
              items:
                type: string
                format: email
            options:
              type: object
              properties:
                preview:
                  type: boolean
                  description: Include preview inside email content.
                include_header:
                  type: boolean
                  description: Include column headers in Excel, CSV attachments.
                include_report_link:
                  type: boolean
                  description: Include link to report / dashboard.
                include_filters:
                  type: boolean
                  description: Include filters info in email content.
                dont_send_when_empty:
                  type: boolean
                  description: Only send the email when at least one widget has data.
                body_text:
                  type: string
                  nullable: true
                  description: Text content inside email body.
                selected_type:
                  type: string
                  nullable: true
                  description: >-
                    Specifies the type of content to be exported, which
                    determines how the data will be structured in the export
                    output.
                  enum:
                    - dashboard
                    - tab
                    - widget
                selected_values:
                  type: array
                  items:
                    anyOf:
                      - type: string
                      - type: integer
                  nullable: true
                  description: >-
                    An array of selected export option values, which can include
                    tab names or widget IDs.
                attachment_formats:
                  type: array
                  items:
                    $ref: '#/components/schemas/DataScheduleAttachmentFormat'
        - $ref: '#/components/schemas/DataScheduleDest'
      required:
        - recipients
    DataScheduleEmailSubscriptionDest:
      type: object
      properties:
        recipients:
          type: array
          items:
            type: string
            format: email
        options:
          type: object
          properties:
            type:
              type: string
              enum:
                - EmailSubscriptionDest
            preview:
              type: boolean
              description: Include preview inside email content.
            include_header:
              type: boolean
              description: Include column headers in Excel, CSV attachments.
            include_report_link:
              type: boolean
              description: Include link to report / dashboard.
            include_filters:
              type: boolean
              description: Include filters info in email content.
            dont_send_when_empty:
              type: boolean
              description: Only send the email when at least one widget has data.
            body_text:
              type: string
              nullable: true
              description: Text content inside email body.
            selected_type:
              type: string
              nullable: true
              description: >-
                Specifies the type of content to be exported, which determines
                how the data will be structured in the export output.
              enum:
                - dashboard
                - tab
                - widget
            selected_values:
              type: array
              items:
                anyOf:
                  - type: string
                  - type: integer
              nullable: true
              description: >-
                An array of selected export option values, which can include tab
                names or widget IDs.
            attachment_formats:
              type: array
              items:
                $ref: '#/components/schemas/DataScheduleAttachmentFormat'
    DataScheduleSftpDest:
      type: object
      allOf:
        - type: object
          properties:
            dashboard_widget_id:
              anyOf:
                - $ref: '#/components/schemas/NullableString'
                - $ref: '#/components/schemas/NullableNumber'
              description: >-
                The widget whose data will be exported to the SFTP destination.
                Only available for dashboard data schedules.
            data_source_id:
              type: integer
            file_path:
              type: string
            format:
              $ref: '#/components/schemas/DataScheduleDataAttachmentFormat'
            include_header:
              type: boolean
              description: Include column headers in the attachment.
            separator:
              type: string
              description: CSV separator.
              nullable: true
              enum:
                - ','
                - '|'
                - "\t"
                - ^
                - ;
        - $ref: '#/components/schemas/DataScheduleDest'
      required:
        - data_source_id
        - file_path
    DataScheduleSlackDest:
      type: object
      allOf:
        - type: object
          properties:
            hide_filters:
              type: boolean
            message:
              type: string
              nullable: true
            slack_channels:
              type: array
              items:
                type: object
            title:
              type: string
              nullable: true
        - $ref: '#/components/schemas/DataScheduleDest'
      required:
        - slack_channels
    DataScheduleGoogleSheetDest:
      type: object
      allOf:
        - type: object
          properties:
            sheet_url:
              type: string
            sheet_title:
              type: string
        - $ref: '#/components/schemas/DataScheduleDest'
      required:
        - sheet_url
        - sheet_title
    DataScheduleAttachmentFormat:
      description: Attachment format.
      type: string
      enum:
        - csv
        - xlsx
        - excel
        - pdf
        - png
        - excel_dashboard
        - csv_formatted_data
    DataScheduleDest:
      type: object
      properties:
        type:
          type: string
          enum:
            - EmailDest
            - EmailSubscriptionDest
            - SlackDest
            - SftpDest
            - GsheetDest
      required:
        - type
    NullableString:
      type: string
      nullable: true
    NullableNumber:
      type: integer
      nullable: true
    DataScheduleDataAttachmentFormat:
      description: Attachment format.
      type: string
      enum:
        - csv
        - xlsx
    DataSchedule:
      type: object
      properties:
        id:
          type: integer
          description: Unique Data Schedule identifier.
        title:
          type: string
          nullable: true
        source_type:
          type: string
          enum:
            - Dashboard
            - QueryReport
        source_id:
          type: integer
        schedule:
          $ref: '#/components/schemas/Schedule'
        dynamic_filter_presets:
          type: array
          items:
            $ref: '#/components/schemas/DynamicFilterPreset'
        dest:
          type: object
          oneOf:
            - $ref: '#/components/schemas/DataScheduleEmailDest'
            - $ref: '#/components/schemas/DataScheduleEmailSubscriptionDest'
            - $ref: '#/components/schemas/DataScheduleSftpDest'
            - $ref: '#/components/schemas/DataScheduleSlackDest'
            - $ref: '#/components/schemas/DataScheduleGoogleSheetDest'
          discriminator:
            propertyName: type
            mapping:
              EmailDest: '#/components/schemas/DataScheduleEmailDest'
              EmailSubscriptionDest: '#/components/schemas/DataScheduleEmailSubscriptionDest'
              SftpDest: '#/components/schemas/DataScheduleSftpDest'
              SlackDest: '#/components/schemas/DataScheduleSlackDest'
              GsheetDest: '#/components/schemas/DataScheduleGoogleSheetDest'
      required:
        - source_type
        - source_id
        - dest
        - schedule
    PaginationCursor:
      type: object
      properties:
        cursors:
          type: object
          properties:
            previous:
              type: string
              nullable: true
              description: >-
                Put this value in the `before` parameter to go to previous page.
                Current page is the first page if this value is null.
            next:
              type: string
              nullable: true
              description: >-
                Put this value in the `after` parameter to go to next page.
                Current page is the last page if this value is null.
      required:
        - cursors
    BaseError:
      type: object
      properties:
        type:
          type: string
          enum:
            - BaseError
            - RecordError
            - InvalidParameterError
            - AuthError
            - MaintenanceError
            - SubscriptionError
            - PermissionDeniedError
            - InternalHolisticsError
            - RateLimitExceedError
            - InvalidOperationError
            - InvalidEmailsInvitationError
        message:
          type: string
        details:
          type: object
          description: Details about this error.
          properties:
            description:
              type: string
            docs:
              type: string
      required:
        - type
        - message
    Message:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    JobStatus:
      type: object
      properties:
        status:
          type: string
          enum:
            - created
            - queued
            - running
            - success
            - failure
            - cancelled
            - cancelling
            - already_existed
            - flow_pending
    AsyncResult:
      type: object
      properties:
        job:
          type: object
          allOf:
            - type: object
              properties:
                id:
                  type: integer
                existing_job_id:
                  type: integer
                  nullable: true
                  description: >-
                    The ID of an existing job. Only present if the job has
                    status `already_existed`.
            - $ref: '#/components/schemas/JobStatus'
      required:
        - job
    FilterSource:
      type: object
      properties:
        source_type:
          type: string
          enum:
            - ManualFilterSource
            - DmFieldFilterSource
      required:
        - source_type
    ManualFilterSource:
      type: object
      allOf:
        - type: object
          properties:
            manual_options:
              type: array
              items:
                type: object
                properties:
                  value:
                    oneOf:
                      - type: string
                      - type: integer
        - $ref: '#/components/schemas/FilterSource'
    FieldPath:
      anyOf:
        - type: object
          properties:
            field_name:
              type: string
            model_id:
              type: integer
              nullable: true
            data_set_id:
              type: integer
              nullable: true
            is_metric:
              type: boolean
              nullable: true
        - type: object
          properties:
            field_name:
              type: string
            model_id:
              type: string
              nullable: true
            data_set_id:
              type: integer
              nullable: true
            is_metric:
              type: boolean
              nullable: true
    DmFieldFilterSource:
      type: object
      allOf:
        - type: object
          properties:
            data_set_id:
              type: integer
            field_path:
              $ref: '#/components/schemas/FieldPath'
        - $ref: '#/components/schemas/FilterSource'
    DynamicFilterDefinition:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        label:
          type: string
        default_condition:
          $ref: '#/components/schemas/Condition'
        filter_type:
          type: string
          enum:
            - number
            - string
            - date
            - boolean
            - pop
            - date_drill
        input_type:
          type: string
          nullable: true
          enum:
            - single_select
            - multi_operator
            - single_select_with_empty_value
            - null
        is_sharable:
          type: boolean
        filter_source:
          type: object
          oneOf:
            - $ref: '#/components/schemas/ManualFilterSource'
            - $ref: '#/components/schemas/DmFieldFilterSource'
          discriminator:
            propertyName: source_type
        constraints:
          type: object
          nullable: true
    DynamicFilterMapping:
      type: object
      properties:
        id:
          type: integer
        viz_conditionable_id:
          type: integer
          description: The id of DashboardWidget that this filter will apply to.
        viz_conditionable_type:
          type: string
          enum:
            - DashboardWidget
        field_path:
          $ref: '#/components/schemas/FieldPath'
        aggregation:
          type: string
          nullable: true
        permissions:
          type: object
          properties:
            crud:
              type: boolean
    DynamicFilter:
      type: object
      properties:
        id:
          anyOf:
            - type: integer
            - type: string
        order:
          type: integer
        uname:
          type: string
        permissions:
          type: object
          properties:
            read:
              type: boolean
            crud:
              type: boolean
            use:
              type: boolean
        definition:
