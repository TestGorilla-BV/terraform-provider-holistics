      discriminator:
        propertyName: operator
        mapping:
          is: '#/components/schemas/Is'
          is_not: '#/components/schemas/IsNot'
          is_null: '#/components/schemas/IsNull'
          not_null: '#/components/schemas/NotNull'
          greater_than: '#/components/schemas/GreaterThan'
          less_than: '#/components/schemas/LessThan'
          between: '#/components/schemas/Between'
          matches_user_attribute: '#/components/schemas/MatchesUserAttribute'
          contains: '#/components/schemas/Contains'
          does_not_contain: '#/components/schemas/DoesNotContain'
          starts_with: '#/components/schemas/StartsWith'
          ends_with: '#/components/schemas/EndsWith'
          is_true: '#/components/schemas/IsTrue'
          is_false: '#/components/schemas/IsFalse'
          last: '#/components/schemas/Last'
          next: '#/components/schemas/Next'
          before: '#/components/schemas/Before'
          after: '#/components/schemas/After'
          matches: '#/components/schemas/Matches'
          transform_pop_relative: '#/components/schemas/TransformPopRelative'
          transform_pop_absolute: '#/components/schemas/TransformPopAbsolute'
          transform_pop_none: '#/components/schemas/TransformPopNone'
          transform_date_drill: '#/components/schemas/TransformDateDrill'
          none: '#/components/schemas/None'
