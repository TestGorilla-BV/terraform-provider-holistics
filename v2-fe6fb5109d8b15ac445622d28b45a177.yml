        '200':
          $ref: '#/components/responses/AsyncResult'
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /data_sources/upload_dbt_manifest: {}
  /data_sources/upload_multiple_dbt_manifests:
    post:
      operationId: DataSources_UploadMultipleDbtManifests
      summary: Upload Multiple dbt manifest.json Files
      description: |
        Upload multiple dbt manifest.json files for a data source atomically.
        Files are staged synchronously (size-validated in the request); parsing
        and the sync run as a background job. Poll `/api/v2/reference/jobs-get`
        for completion.

        Limits: at most 5 files per request, 2O0 MB per file.
        Malformed JSON is reported via the job's failure status, not the HTTP
        response.

        Gated by the `data_source:dbt_multi_manifest_upload` feature toggle.
      x-holistics-internal: false
      tags:
        - Data Sources
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                data_source_name:
                  type: string
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: One or more manifest.json files to upload atomically
              required:
                - files
