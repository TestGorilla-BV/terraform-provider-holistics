          description: >-
            The aggregation that will be applied on the field when processing
            the condition.
          type: string
          nullable: true
          enum:
            - sum
            - avg
            - max
            - min
            - running sum
            - running avg
            - running max
            - running min
            - count
            - count distinct
            - median
            - stdev
            - stdevp
            - var
            - varp
            - custom
