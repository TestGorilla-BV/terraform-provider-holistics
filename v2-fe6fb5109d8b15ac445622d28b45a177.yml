                  items:
                    type: string
                  description: List of tags to add to the object
                project_id:
                  type: number
                  description: >-
                    AML Project Id. If not provided, default to user's first
                    project.
                  nullable: true
              required:
                - object_params
                - tags
      responses:
        '200':
          $ref: '#/components/responses/AsyncResult'
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
  /tags/submit_remove_object_tags:
    post:
      operationId: TaggingSystem_SubmitRemoveObjectTags
      summary: Remove tags from an object
      tags:
        - Tagging System
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                object_params:
                  type: object
                  properties:
                    uname:
                      type: string
                    type:
                      type: string
                      enum:
                        - dataset
                        - dashboard
                tags:
                  type: array
                  items:
                    type: string
                  description: >-
                    List of tags to remove from the object. Pass in an empty
                    array to remove all tags.
                project_id:
                  type: number
                  nullable: true
                  description: >-
                    AML Project Id. If not provided, default to user's first
                    project.
              required:
                - object_params
                - tags
      responses:
        '200':
          $ref: '#/components/responses/AsyncResult'
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
  /tags/recommend_archivable_objects:
    get:
      operationId: TaggingSystem_RecommendArchivableObjects
      summary: Get all AML objects that are recommended to be archived
      tags:
        - Tagging System
      description: >-
        Return a list of AML dashboards and datasets which have not been viewed
        for more than 30 days
      responses:
        '200':
          description: AML objects that are recommended to be archived.
          content:
            application/json:
              schema:
                type: object
                properties:
                  archivable_objects:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        title:
                          type: string
                        type:
                          type: string
                        description:
                          type: string
                          nullable: true
                        tags:
                          type: array
                          nullable: true
                          items:
                            type: string
                        uname:
                          type: string
                        owner_name:
                          type: string
                        project_id:
                          type: integer
                        permissions:
                          type: object
                          properties:
                            can_live_update:
                              type: boolean
                            can_edit:
                              type: boolean
                        last_viewed_at:
                          type: string
                          nullable: true
                        email_schedules_count:
                          type: integer
                          nullable: true
                        data_alerts_count:
                          type: integer
                          nullable: true
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /git_webhooks/github_event:
    post:
      operationId: GitWebhooks_GithubEvent
      summary: Process GitHub webhook events
      description: >-
        Endpoint for receiving GitHub webhook events related to pull requests
        and push events. Used for AmlStudio PR workflow integration.
      tags:
        - Webhook
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: GitHub webhook payload containing event data
      parameters:
        - in: header
          name: X-GitHub-Event
          required: true
          schema:
            type: string
            enum:
              - pull_request
              - push
              - ping
          description: The type of event that triggered the webhook
        - in: header
          name: X-GitHub-Hook-ID
          required: true
          schema:
            type: string
          description: The ID of the webhook that triggered the request
        - in: header
          name: X-Hub-Signature-256
          required: true
          schema:
            type: string
          description: The HMAC hex digest of the payload, used for verification
      responses:
        '200':
          description: Event processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebhookTenantResult'
                required:
                  - data
        '422':
          $ref: '#/components/responses/InvalidOperationError'
  /git_webhooks/gitlab_event:
    post:
      operationId: GitWebhooks_GitlabEvent
      summary: Process GitLab webhook events
      description: >-
        Endpoint for receiving GitLab webhook events related to merge requests
        and push events. Used for AmlStudio PR workflow integration.
      tags:
        - Webhook
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: GitLab webhook payload containing event data
      parameters:
        - in: header
          name: X-Gitlab-Event
          required: true
          schema:
            type: string
            enum:
              - Merge Request Hook
              - Push Hook
              - System Hook
          description: The type of event that triggered the webhook
        - in: header
          name: X-Gitlab-Token
          required: true
          schema:
            type: string
          description: The secret token used for webhook verification
      responses:
        '200':
          description: Event processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebhookTenantResult'
                required:
                  - data
        '422':
          $ref: '#/components/responses/InvalidOperationError'
  /git_webhooks/github_app_event:
    post:
      operationId: GitWebhooks_GithubAppEvent
      summary: Process GitHub App webhook events
      description: >
        Endpoint for receiving webhook events from the GitHub App integration.

        Handles installation lifecycle events (install, uninstall, suspend,
        unsuspend),

        repository access changes, and repository events (pull requests,
        pushes).

        The request signature is validated via HMAC before processing. No
        authentication is required.
      tags:
        - Webhook
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: GitHub App webhook payload containing event data
      parameters:
        - in: header
          name: X-GitHub-Event
          required: true
          schema:
            type: string
          description: >-
            The type of GitHub event that triggered the webhook (e.g.,
            installation, push, pull_request)
        - in: header
          name: X-Hub-Signature-256
          required: true
          schema:
            type: string
          description: HMAC hex digest of the payload for signature verification
      responses:
        '200':
          description: Event processed or skipped
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - skipped
                      - processed
                    description: >
                      General result status.

                      **skipped** — the event was not handled (unrecognized
                      event type, suspended app, etc.).

                      **processed** — the event was handled and per-tenant
                      results are included.
                  data:
                    type: array
                    description: >-
                      Per-tenant processing results (present when status is
                      processed)
                    items:
                      $ref: '#/components/schemas/WebhookTenantResult'
                required:
                  - status
        '404':
          $ref: '#/components/responses/NotFoundError'
