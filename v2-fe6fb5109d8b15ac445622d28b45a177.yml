      description: >
        *This feature is currently in Beta.*


        Bust (invalidate) all exploration/report
        [cache](/docs/performance/data-caching) of the specified Data Source.
        After a successful busting, all explorations/reports running on the
        specified Data Source will return fresh data.


        Please note that this does not bust or trigger the Data Source's [Model
        Storages](/docs/storage-settings). Hence, even after calling this API,
        the explorations/reports can only be as fresh as the data persisted in
        the Model Storages.
      tags:
        - Data Sources
