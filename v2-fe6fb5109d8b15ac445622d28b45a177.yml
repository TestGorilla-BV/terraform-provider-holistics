    Job:
      type: object
      allOf:
        - type: object
          properties:
            id:
              type: integer
            user_id:
              type: integer
            start_time:
              type: string
              nullable: true
            end_time:
              type: string
              nullable: true
            cancellable:
              type: boolean
            last_error_log:
              description: The last ERROR-level log of the Job.
              type: string
              nullable: true
            data_source_stats:
              description: >
                Data Source statistics collected when running queries in this
                Job.  


                Note: Only available in Jobs which run queries on Data Sources
                that

                * support Data Source statistics

                * and have Holistics Canal enabled


                Otherwise, this field will be `null`.
              type: array
              nullable: true
              items:
                type: object
                properties:
                  id:
                    description: |
                      Identifier of the execution unit in the Data Source.
                      * BigQuery: BigQuery Job ID
                      * Amazon Athena: Athena query ID
                    type: string
                  cost:
                    description: Cost of execution in the Data Source
                    type: string
                  cost_unit:
                    type: string
                example:
                  id: XoBDpSVo2mMsHiQHNrPtEtfnozm
                  cost: 1681980
                  cost_unit: B
            source:
              description: Information of the source where the Job is created
              type: object
              nullable: true
              properties:
                type:
                  type: string
                id:
                  anyOf:
                    - type: string
                    - type: integer
                  nullable: true
                action:
                  type: string
                details:
                  description: Additional details about the Job source, if any
                  type: object
                  nullable: true
              example:
                type: Dashboard
                id: '1'
                action: view_viz
                details:
                  block_id: v1
                  block_type: VizBlock
                  block_display_title: Yearly Report
            existing_job_id:
              description: >
                The ID of another existing Pending/Starting/Running job.

                For more information, see [Job
                duplication](/docs/api/jobs#job-duplication).


                Note: Only available for Jobs with status `already_existed`.
                Otherwise, this field will be `null`.
              type: integer
              nullable: true
        - $ref: '#/components/schemas/JobStatus'
