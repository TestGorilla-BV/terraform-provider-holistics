        end_timestamp:
          type: string
        tenant_id:
          type: integer
        user_id:
          type: integer
    SecretProvider:
      type: string
      enum:
        - openai
        - gemini
        - anthropic
        - holistics_openai
        - holistics_gemini
        - holistics_anthropic
    WebhookTenantResult:
      type: object
      properties:
        status:
          type: string
          enum:
            - success
            - failed
            - skipped
          description: The result status for this tenant
        base_url:
          type: string
          description: The base URL of the tenant
        tenant_name:
          type: string
          description: The name of the tenant
        tenant_id:
          type: integer
          description: The ID of the tenant
        message:
          type: string
          description: Optional message describing the result
      required:
        - status
        - base_url
        - tenant_name
        - tenant_id
    BaseSecret:
      type: object
      properties:
        id:
          type: number
          readOnly: true
        provider:
          $ref: '#/components/schemas/SecretProvider'
        status:
          type: string
          enum:
            - active
            - inactive
      required:
        - provider
    OpenAISecret:
      type: object
      allOf:
        - type: object
          properties:
            content:
              type: object
              properties:
                api_key:
                  type: string
                  nullable: true
            settings:
              type: object
              properties:
                base_url:
                  type: string
                  nullable: true
        - $ref: '#/components/schemas/BaseSecret'
    AnthropicSecret:
      type: object
      allOf:
        - type: object
          properties:
            content:
              type: object
              properties:
                api_key:
                  type: string
                  nullable: true
        - $ref: '#/components/schemas/BaseSecret'
    GeminiSecret:
      type: object
      allOf:
        - type: object
          properties:
            content:
              type: object
              properties:
                api_key:
                  type: string
                  nullable: true
        - $ref: '#/components/schemas/BaseSecret'
    Secret:
      type: object
      properties:
        secret:
          type: object
          oneOf:
            - $ref: '#/components/schemas/OpenAISecret'
          discriminator:
            propertyName: provider
            mapping:
              openai: '#/components/schemas/OpenAISecret'
              anthropic: '#/components/schemas/AnthropicSecret'
              gemini: '#/components/schemas/GeminiSecret'
    Tool:
      type: object
      properties:
        name:
          type: string
        title:
          type: string
        description:
          type: string
        input_schema:
          type: object
        output_schema:
          type: object
  parameters:
    Before:
      name: before
      in: query
      description: Only get records before this cursor.
      schema:
        type: string
    After:
      name: after
      in: query
      description: Only get records after this cursor.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      description: Limit number of records per page.
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    Page:
      name: page
      in: query
      description: >-
        Page number for offset-based pagination (1-indexed). When provided,
        cursor-based pagination (before/after) is ignored.
      schema:
        type: integer
        minimum: 1
    SearchTerm:
      name: search_term
      in: query
      description: Search records by its name, title...
      schema:
        type: string
    IntResourceId:
      name: id
      in: path
      description: Resource id with type integer
      required: true
      schema:
        type: integer
    ResourceId:
      name: id
      in: path
      description: Resource id.
      required: true
      schema:
        anyOf:
          - type: string
          - type: integer
    EmailAttribute:
      name: email
      in: query
      description: Query parameter for email attribute.
      schema:
        type: string
  responses:
    UnauthorizedError:
      description: Unauthorized access or invalid credential was used.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BaseError'
    InvalidParametersError:
      description: Invalid parameters were sent.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BaseError'
    PermissionDeniedError:
      description: Access forbidden.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BaseError'
    InvalidOperationError:
      description: Invalid Operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BaseError'
    NotFoundError:
      description: Resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BaseError'
    AsyncResult:
      description: >-
        Async result.

        The operation will be executed asynchronously in a Job. You can check
        Job status using [Jobs APIs](#tag/Jobs). 
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AsyncResult'
    JobResult:
      description: Job result.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/JobResult'
    ExportJobNotReady:
      description: Job is not successful or not ready to be downloaded yet.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BaseError'
    BaseError:
      description: Base error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BaseError'
    DataOrAsyncResult:
      description: >-
        Will return result data directly if cached, else create job to do the
        action and return job's status.
      content:
        application/json:
          schema:
            type: object
            oneOf:
              - $ref: '#/components/schemas/Data'
              - $ref: '#/components/schemas/AsyncResult'
    RateLimitExceedError:
      description: Rate Limit Exceed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BaseError'
    MessageOrAsyncResult:
      description: >-
        Will return result message of action immediately, else create job to do
        the action and return job's status.
      content:
        application/json:
          schema:
            type: object
            oneOf:
              - $ref: '#/components/schemas/AsyncResult'
              - $ref: '#/components/schemas/Message'
    InvalidEmailsInvitationError:
      description: Some emails are invalid when inviting users.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/InvalidEmailsInvitationError'
    RecordError:
      description: Record was not valid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RecordError'
    AiAnswerOrAsyncResult:
      description: >-
        Will return AI answer immediately, else create job to do the action and
        return job's status. This is based on params skip_job
      content:
        application/json:
          schema:
            type: object
            oneOf:
              - $ref: '#/components/schemas/AsyncResult'
              - $ref: '#/components/schemas/Answer'
    McpToolResultOrAsyncResult:
      description: >-
        Will return MCP result immediately, else create job to do the action and
        return job's status. This is based on tool type
      content:
        application/json:
          schema:
            type: object
            oneOf:
              - $ref: '#/components/schemas/AsyncResult'
              - type: object
                properties:
                  result:
                    type: object
                required:
                  - result
  examples:
    DataScheduleEmailDest:
      value:
        data_schedule:
          id: 1
          source_type: Dashboard
          source_id: 1
          schedule:
            repeat: '* * * * *'
            paused: false
          dynamic_filter_presets:
            - id: 1
              dynamic_filter_id: 1
              public_hidden: true
              preset_condition:
                modifier: null
                operator: is
                values:
                  - alice
          dest:
            type: EmailDest
            title: Sale report for {{$today}}
            recipients:
              - support@holistics.io
              - hello@holistics.io
            options:
              preview: true
              include_header: true
              include_report_link: true
              include_filters: false
              dont_send_when_empty: true
              body_text: Report
              attachment_formats:
                - pdf
                - csv
    DataScheduleSftpDest:
      value:
        data_schedule:
          id: 1
          source_type: Dashboard
          source_id: 1
          schedule:
            repeat: '* * * * *'
            paused: false
          dynamic_filter_presets:
            - id: 1
              dynamic_filter_id: 1
              public_hidden: true
              preset_condition:
                modifier: null
                operator: is
                values:
                  - alice
          dest:
            type: SftpDest
            dashboard_widget_id: 1
            data_source_id: 1
            file_path: /report
            format: csv
            include_header: true
            separator: ','
paths:
  /data_schedules:
    get:
      operationId: DataSchedules_List
      summary: List Data Schedules
      tags:
        - Data Schedules
      parameters:
        - $ref: '#/components/parameters/Before'
        - $ref: '#/components/parameters/After'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/SearchTerm'
        - name: sort
          in: query
          description: Sort order for the records.
          schema:
            type: string
            enum:
              - id_asc
              - id_desc
              - title_asc
              - title_desc
              - destination_asc
              - destination_desc
              - source_title_asc
              - source_title_desc
              - last_run_asc
              - last_run_desc
              - org_id_asc
              - org_id_desc
              - external_user_id_asc
              - external_user_id_desc
            default: id_asc
        - name: dest_type
          in: query
          description: Filter by destination type.
          schema:
            type: string
            enum:
              - EmailDest
              - SlackDest
              - Adls2Dest
              - SftpDest
              - EmailSubscriptionDest
        - name: source_type
          in: query
          description: Filter by source type.
          schema:
            type: string
            enum:
              - QueryReport
              - Dashboard
        - name: source_id
          in: query
          description: Filter by source id.
          schema:
            type: integer
        - name: creator_roles
          in: query
          description: >-
            Filter schedules by creator roles. Default includes all roles except
            'embed'. Pass array of roles to filter by specific user roles.
          schema:
            type: array
            items:
              type: string
              enum:
                - admin
                - growth_admin
                - analyst
                - user
                - public
                - explorer
                - embed
            default:
              - admin
              - growth_admin
              - analyst
              - user
              - public
              - explorer
      responses:
        '200':
          description: List of Data Schedules.
          content:
            application/json:
              schema:
                type: object
                allOf:
                  - type: object
                    properties:
                      data_schedules:
                        type: array
                        items:
                          $ref: '#/components/schemas/DataSchedule'
                      total_count:
                        type: integer
                        description: >-
                          Total number of records matching the query (before
                          pagination).
                    required:
                      - data_schedules
                      - total_count
                  - $ref: '#/components/schemas/PaginationCursor'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      operationId: DataSchedules_Create
      summary: Create a Data Schedule
      tags:
        - Data Schedules
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data_schedule:
                  $ref: '#/components/schemas/DataSchedule'
              required:
                - data_schedule
            examples:
              EmailSchedule:
                $ref: '#/components/examples/DataScheduleEmailDest'
              SftpSchedule:
                $ref: '#/components/examples/DataScheduleSftpDest'
      responses:
        '201':
          description: Data Schedule was created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data_schedule:
                    $ref: '#/components/schemas/DataSchedule'
                required:
                  - data_schedule
        '400':
          $ref: '#/components/responses/InvalidParametersError'
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
        '422':
          $ref: '#/components/responses/InvalidOperationError'
  /data_schedules/{id}:
    parameters:
      - $ref: '#/components/parameters/IntResourceId'
    get:
      operationId: DataSchedules_Get
      summary: Get a Data Schedule
      tags:
        - Data Schedules
      responses:
        '200':
          description: A Data Schedule.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data_schedule:
                    $ref: '#/components/schemas/DataSchedule'
                required:
                  - data_schedule
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      operationId: DataSchedules_Update
      summary: Update a Data Schedule
      tags:
        - Data Schedules
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data_schedule:
                  $ref: '#/components/schemas/DataSchedule'
              required:
                - data_schedule
      responses:
        '200':
          description: Data Schedule was updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data_schedule:
                    $ref: '#/components/schemas/DataSchedule'
                required:
                  - data_schedule
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
    delete:
      operationId: DataSchedules_Delete
      summary: Delete a Data Schedule
      tags:
        - Data Schedules
      responses:
        '200':
          description: Data schedule was deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
  /data_schedules/submit_execute:
    post:
      operationId: DataSchedules_SubmitExecuteTest
      summary: Execute a Test Data Schedule
      tags:
        - Data Schedules
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                test_data_schedule:
                  allOf:
                    - $ref: '#/components/schemas/DataSchedule'
                    - type: object
                      properties:
                        id:
                          nullable: true
                          type: integer
                          description: Unique Data Schedule identifier.
              required:
                - test_data_schedule
      responses:
        '200':
          $ref: '#/components/responses/AsyncResult'
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
  /data_schedules/{id}/submit_execute:
    parameters:
      - $ref: '#/components/parameters/IntResourceId'
    post:
      operationId: DataSchedules_SubmitExecute
      summary: Execute a Data Schedule
      tags:
        - Data Schedules
      responses:
        '200':
          $ref: '#/components/responses/AsyncResult'
  /dashboards:
    get:
      operationId: Dashboards_List
      summary: List Dashboards
      tags:
        - Dashboards
      parameters:
        - $ref: '#/components/parameters/Before'
        - $ref: '#/components/parameters/After'
        - $ref: '#/components/parameters/Limit'
        - name: sort
          in: query
          description: |
            Sort dashboards according to the specified sort order.
          schema:
            type: string
            enum:
              - natural
              - id_asc
              - id_desc
            default: natural
        - name: include_embed_info
          in: query
          description: Decide whether embed info is included or not.
          schema:
            type: boolean
      responses:
        '200':
          description: List of Dashboards.
          content:
            application/json:
              schema:
                type: object
                allOf:
                  - type: object
                    properties:
                      dashboards:
                        type: array
                        items:
                          $ref: '#/components/schemas/Dashboard'
                    required:
                      - dashboards
                  - $ref: '#/components/schemas/PaginationCursor'
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
  /dashboards/{id}:
    parameters:
      - $ref: '#/components/parameters/IntResourceId'
    get:
      operationId: Dashboards_Get
      summary: Get a Dashboard
      tags:
        - Dashboards
      parameters: []
      responses:
        '200':
          description: A Dashboard.
          content:
            application/json:
              schema:
                type: object
                properties:
                  dashboard:
                    $ref: '#/components/schemas/Dashboard'
                required:
                  - dashboard
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
    delete:
      operationId: Dashboards_Delete
      summary: Delete a Dashboard
      tags:
        - Dashboards
      responses:
        '200':
          description: Dashboard was deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/InvalidOperationError'
  /dashboards/{id}/build_url:
    post:
      operationId: Dashboards_BuildUrl
      summary: Build a Dashboard URL with preset filter states
      tags:
        - Dashboards
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                filter_states:
                  type: array
                  items:
                    $ref: '#/components/schemas/DynamicFilterCondition'
      responses:
        '200':
          description: A Dashboard URL.
          content:
            application/json:
              schema:
                type: object
                properties:
                  dashboard_url:
                    description: >-
                      The full Dashboard URL with preset filter states. This URL
                      already includes the fstate_hash.
                    type: string
                  fstate_hash:
                    description: >-
                      The hash key representing the filter states data. Note: It
                      is null when there are no submitted filter_states.
                    type: string
                    nullable: true
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/InvalidOperationError'
    parameters:
      - $ref: '#/components/parameters/IntResourceId'
  /dashboards/{id}/submit_preload:
    parameters:
      - $ref: '#/components/parameters/IntResourceId'
    post:
      operationId: Dashboards_SubmitPreload
      summary: Preload a Dashboard
      description: >-
        Preload a Dashboard by executing its widgets (using the submitted filter
        conditions, or default filter conditions if not submitted) and storing
        the widgets' results into Holistics cache.

        Read more about [Data Caching](/docs/performance/data-caching).
      tags:
        - Dashboards
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                dashboard_filter_conditions:
                  type: array
                  items:
                    $ref: '#/components/schemas/DynamicFilterCondition'
                bust_cache:
                  type: boolean
                  description: >-
                    If set to True, ignore existing cache and always execute the
                    widgets. Otherwise, do not execute the widgets that are
                    already cached.
                  default: false
            examples:
              Use all default filter conditions:
                value: {}
              Specify some filters and use default conditions for the rest:
                value:
                  dashboard_filter_conditions:
                    - dynamic_filter_id: 101
                      condition:
                        operator: matches
                        values:
                          - last week
                    - dynamic_filter_id: 201
                      condition:
                        operator: is
                        values:
                          - alice
                          - bob
              Skipping specific default filters:
                value:
                  dashboard_filter_conditions:
                    - dynamic_filter_id: 301
                      condition:
                        operator: none
                        values: []
      responses:
        '200':
          $ref: '#/components/responses/AsyncResult'
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /dashboards/list_metadata:
    get:
      operationId: Dashboards_ListMetadata
      summary: List all dashboards metadata
      tags:
        - Dashboards
      parameters:
        - name: version
          in: query
          description: filtered by dashboard version
          schema:
            oneOf:
              - type: integer
                nullable: true
              - type: array
                items:
                  type: integer
        - name: permission_action
          in: query
          description: filtered by dashboard permission, default is read
          schema:
            type: string
            enum:
              - create
              - read
              - update
              - destroy
            default: read
      responses:
        '200':
          description: List of Dashboards metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  dashboards_metadata:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: dashboard id
                        title:
                          type: string
                          description: dashboard title
                        uname:
                          type: string
                          description: dashboard unique name
                          nullable: true
                        project_id:
                          type: integer
                          description: project id of AML dashboard
                          nullable: true
                        version:
                          type: integer
                          description: dashboard version
  /dashboards/{id}/clone_canvas_dashboard:
    post:
      operationId: Dashboards_CloneCanvasDashboard
      summary: Clone a canvas dashboard
      tags:
        - Dashboards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID of the dashboard to clone
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                category_type:
                  $ref: '#/components/schemas/DashboardCategory'
                category_id:
                  type: integer
                  description: The category ID to place the cloned dashboard in
                  nullable: true
                new_uname:
                  type: string
                  description: New unique name for the cloned dashboard
                new_title:
                  type: string
                  description: New title for the cloned dashboard
              required:
                - category_type
                - new_uname
      responses:
        '200':
          $ref: '#/components/responses/AsyncResult'
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
        '422':
          $ref: '#/components/responses/InvalidOperationError'
  /dashboard_widgets/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: DashboardWidgets_Get
      summary: Get a Dashboard Widget
      tags:
        - Dashboard Widgets
      parameters:
        - name: include_dashboard
          in: query
          description: Decide whether dashboard is included or not.
          schema:
            type: boolean
        - name: include_report
          in: query
          description: Decide whether report is included or not.
          schema:
            type: boolean
        - name: include_url
          in: query
          description: Decide whether dashboard url, widget url is included or not.
          schema:
            type: boolean
      responses:
        '200':
          description: A Dashboard Widget.
          content:
            application/json:
              schema:
                type: object
                properties:
                  dashboard_widget:
                    $ref: '#/components/schemas/DashboardWidget'
                required:
                  - dashboard_widget
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      operationId: DashboardWidgets_Delete
      summary: Delete a Dashboard Widget
      tags:
        - Dashboard Widgets
      responses:
        '200':
          description: Dashboard Widget was deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          $ref: '#/components/responses/PermissionDeniedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /dashboard_widgets/{id}/submit_export:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    post:
      operationId: DashboardWidgets_SubmitExport
      summary: Export a Dashboard Widget
      description: >-
        See more details on how to export a widget at [Get
        Data](/api/v2/get-data). When the Job is finished, you can download the
        exported file using the [download export
        API](#tag/Exports/operation/Exports_Download).
      tags:
        - Dashboard Widgets
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                output:
                  type: string
                  description: Output file type.
                  enum:
                    - csv
                    - xlsx
                    - pdf
                dashboard_filter_conditions:
                  type: array
                  items:
                    $ref: '#/components/schemas/DynamicFilterCondition'
              required:
                - output
      responses:
        '200':
          $ref: '#/components/responses/AsyncResult'
  /jobs:
    get:
      operationId: Jobs_List
      summary: List Jobs
      tags:
        - Jobs
      parameters:
        - name: ids
          in: query
          description: >
            IDs of the Jobs that you want to list. Non-existent IDs will be
            ignored.  

            Limit: 100  

            Example: `ids[]=1&ids[]=2&ids[]=3`
          schema:
            type: array
            items:
              type: integer
          required: true
        - name: include_data_source_stats
          in: query
          description: |
            Include `data_source_stats` in the response
          schema:
            type: boolean
        - name: include_source
          in: query
          description: |
            Include `source` in the response
          schema:
            type: boolean
      responses:
        '200':
