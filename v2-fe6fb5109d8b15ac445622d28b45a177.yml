  /users:
    get:
      operationId: Users_List
      summary: List Users
      tags:
        - Users
      parameters:
        - $ref: '#/components/parameters/Before'
        - $ref: '#/components/parameters/After'
        - $ref: '#/components/parameters/Limit'
        - name: search_term
          in: query
          description: Search by User `email`, `name`, `initials` or Group names.
          schema:
            type: string
        - name: status
          in: query
          description: Filter by User `status`.
          schema:
            $ref: '#/components/schemas/UserStatus'
        - name: statuses
          in: query
          description: Filter by multiple User `status`es.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/UserStatus'
        - name: ids
          in: query
          description: Filter by multiple User `id`s.
          schema:
            type: array
            items:
              type: integer
        - name: role
          in: query
          description: Filter by User `role`.
          schema:
            $ref: '#/components/schemas/UserRole'
        - name: has_authentication_token
          in: query
          description: >
            Whether or not to include users who have API key.


            *Note:* the result also includes users even when their API access
            has been revoked.
          schema:
            type: boolean
        - name: exclude_deleted
          in: query
          description: Whether or not to exclude deleted Users.
          schema:
            type: boolean
        - name: sort
          in: query
          description: >
            Sort the Users according to the specified sort order.


            If multiple records have the same value, the corresponding order of
            User `id` will be applied to assure consistent result.
          schema:
            type: string
            enum:
              - natural
              - id_asc
              - id_desc
              - name_asc
              - name_desc
              - initials_asc
              - initials_desc
            default: natural
      responses:
        '200':
          description: User listing response.
          content:
            application/json:
              schema:
                type: object
                allOf:
                  - type: object
                    properties:
                      counters:
                        $ref: '#/components/schemas/UsersCounters'
                      users:
                        description: >-
                          List of Users. Each `User` object also contains
                          `group_ids` which is the ID list of the Groups that
                          the User belongs to.
                        type: array
                        items:
                          allOf:
                            - type: object
                              properties:
                                group_ids:
                                  type: array
                                  items:
                                    type: integer
                              required:
                                - group_ids
                            - $ref: '#/components/schemas/User'
                      groups:
                        type: object
                        description: >
                          An object containing Group ids as keys with their
                          corressponding Group data as values.


                          > NOTE: this only contains the Groups of the Users
                          above.
                        additionalProperties:
                          type: object
                          $ref: '#/components/schemas/Group'
                        example:
                          '1':
                            id: 1
                            name: string
                          '2':
                            id: 2
                            name: string
                    required:
                      - counters
                      - users
                      - groups
                  - $ref: '#/components/schemas/PaginationCursor'
