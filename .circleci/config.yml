version: 2.1

orbs:
  go: circleci/go@3.0.4

executors:
  go:
    docker:
      - image: cimg/go:1.23
    resource_class: medium

jobs:
  lint:
    executor: go
    steps:
      - checkout
      - go/mod-download-cached
      - run:
          name: go vet
          command: go vet ./...
      - run:
          name: gofmt check
          command: |
            if [ -n "$(gofmt -l .)" ]; then
              echo "gofmt found unformatted files:"
              gofmt -l .
              exit 1
            fi

  test:
    executor: go
    steps:
      - checkout
      - go/mod-download-cached
      # with-cache wraps the build/test steps with restore + save_cache of
      # ~/.cache/go-build, Go's compiled-package cache. On a warm cache,
      # `go test` reuses already-compiled packages instead of recompiling
      # from source.
      - go/with-cache:
          build: true
          steps:
            - run:
                name: go build
                command: go build ./...
            - run:
                name: unit tests
                command: go test -race -timeout 5m ./...

  acceptance:
    executor: go
    steps:
      - checkout
      - go/mod-download-cached
      - go/with-cache:
          build: true
          steps:
            - run:
                name: acceptance tests (in-process mock)
                environment:
                  TF_ACC: "1"
                command: go test -timeout 15m -count=1 ./internal/provider/...

  docs-check:
    executor: go
    steps:
      - checkout
      - go/mod-download-cached
      - run:
          name: prepend ~/bin to PATH for later steps
          command: |
            mkdir -p "$HOME/bin"
            echo 'export PATH="$HOME/bin:$PATH"' >> "$BASH_ENV"
      # Terraform binary (~25MB curl + unzip). tfplugindocs uses it to dump
      # the provider's JSON schema; if missing, hc-install tries to fetch it
      # and fails on expired PGP keys. Cache key is the version literal — bump
      # the version to invalidate.
      - restore_cache:
          keys:
            - v1-terraform-1.9.8
      - run:
          name: install Terraform if not cached
          command: |
            if [ ! -x "$HOME/bin/terraform" ]; then
              TERRAFORM_VERSION=1.9.8
              curl -fsSL -o /tmp/terraform.zip \
                "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
              unzip -q -o /tmp/terraform.zip -d "$HOME/bin"
            fi
            terraform version
      - save_cache:
          key: v1-terraform-1.9.8
          paths:
            - ~/bin/terraform
      # tfplugindocs is a slow `go install` (heavy dep tree). Cache the
      # compiled binary — ~/go/bin is on PATH by default on cimg/go.
      - restore_cache:
          keys:
            - v1-tfplugindocs-v0.20.0
      - run:
          name: install tfplugindocs if not cached
          command: |
            if ! command -v tfplugindocs >/dev/null; then
              go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.20.0
            fi
            tfplugindocs --version || true
      - save_cache:
          key: v1-tfplugindocs-v0.20.0
          paths:
            - ~/go/bin/tfplugindocs
      - run:
          name: regenerate docs
          command: tfplugindocs generate --provider-name holistics
      - run:
          name: fail on drift
          command: |
            if [ -n "$(git status --porcelain docs/)" ]; then
              echo "docs/ is out of date; run 'make docs' and commit."
              git --no-pager diff docs/
              exit 1
            fi

  release:
    executor: go
    steps:
      - checkout
      - go/mod-download-cached
      - run:
          name: import GPG key
          # GPG_PRIVATE_KEY: ASCII-armored, base64-encoded private key.
          # GPG_FINGERPRINT: long-form fingerprint (40-hex), matches the key
          #                  registered at registry.terraform.io.
          # GPG_PASSPHRASE:  passphrase for the key (set to empty string if
          #                  the key has none). Required: gpg refuses to sign
          #                  in --pinentry-mode loopback without it.
          command: |
            mkdir -p ~/.gnupg
            chmod 700 ~/.gnupg
            # Allow loopback pinentry so gpg can read the passphrase from
            # command-line args instead of a TTY (which CI lacks).
            echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
            gpgconf --kill gpg-agent
            echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
            echo "${GPG_FINGERPRINT}:6:" | gpg --import-ownertrust
            gpg --list-secret-keys --keyid-format=long
      # The orb's install-goreleaser downloads the prebuilt binary from
      # GoReleaser's GitHub releases (a few seconds) instead of `go install`
      # rebuilding from source (~30-60s on a cold module cache). No local
      # cache step needed — the download is fast enough either way.
      - go/install-goreleaser:
          version: v2.4.5
      - run:
          name: GoReleaser
          # GITHUB_TOKEN: classic PAT with `repo` scope, used to upload assets
          # to the GitHub release.
          command: goreleaser release --clean

workflows:
  ci:
    jobs:
      - lint
      - test
      - acceptance
      - docs-check
  release:
    jobs:
      - release:
          context:
            - terraform-registry-release  # shared across all TestGorilla-BV terraform providers; holds GPG_*, GITHUB_TOKEN
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+(-[\w.]+)?$/
            branches:
              ignore: /.*/
