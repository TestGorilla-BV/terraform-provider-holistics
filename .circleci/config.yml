version: 2.1

orbs:
  go: circleci/go@3.0.2

executors:
  go:
    docker:
      - image: cimg/go:1.23
    resource_class: medium

jobs:
  lint:
    executor: go
    steps:
      - checkout
      - go/mod-download-cached
      - run:
          name: go vet
          command: go vet ./...
      - run:
          name: gofmt check
          command: |
            if [ -n "$(gofmt -l .)" ]; then
              echo "gofmt found unformatted files:"
              gofmt -l .
              exit 1
            fi

  test:
    executor: go
    steps:
      - checkout
      - go/mod-download-cached
      - run:
          name: go build
          command: go build ./...
      - run:
          name: unit tests
          command: go test -race -timeout 5m ./...

  acceptance:
    executor: go
    steps:
      - checkout
      - go/mod-download-cached
      - run:
          name: acceptance tests (in-process mock)
          environment:
            TF_ACC: "1"
          command: go test -timeout 15m -count=1 ./internal/provider/...

  docs-check:
    executor: go
    steps:
      - checkout
      - go/mod-download-cached
      - run:
          name: install Terraform
          # tfplugindocs uses Terraform to dump the provider's JSON schema. If
          # terraform isn't already on PATH, tfplugindocs falls back to
          # downloading it via hc-install — which fails because the HashiCorp
          # PGP key embedded in hc-install expires periodically. Installing
          # Terraform up front sidesteps that entirely.
          command: |
            TERRAFORM_VERSION=1.9.8
            curl -fsSL -o /tmp/terraform.zip \
              "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
            sudo unzip -q -o /tmp/terraform.zip -d /usr/local/bin
            terraform version
      - run:
          name: install tfplugindocs
          command: go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.20.0
      - run:
          name: regenerate docs
          command: tfplugindocs generate --provider-name holistics
      - run:
          name: fail on drift
          command: |
            if [ -n "$(git status --porcelain docs/)" ]; then
              echo "docs/ is out of date; run 'make docs' and commit."
              git --no-pager diff docs/
              exit 1
            fi

  release:
    executor: go
    steps:
      - checkout
      - go/mod-download-cached
      - run:
          name: import GPG key
          # GPG_PRIVATE_KEY: ASCII-armored, base64-encoded private key.
          # GPG_FINGERPRINT: long-form fingerprint (40-hex), matches the key
          #                  registered at registry.terraform.io.
          command: |
            echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
            echo "${GPG_FINGERPRINT}:6:" | gpg --import-ownertrust
            gpg --list-secret-keys --keyid-format=long
      - run:
          name: install GoReleaser
          command: go install github.com/goreleaser/goreleaser/v2@v2.4.5
      - run:
          name: GoReleaser
          # GITHUB_TOKEN: classic PAT with `repo` scope, used to upload assets
          # to the GitHub release.
          command: goreleaser release --clean

workflows:
  ci:
    jobs:
      - lint
      - test
      - acceptance
      - docs-check
  release:
    jobs:
      - release:
          context:
            - terraform-registry-release  # shared across all TestGorilla-BV terraform providers; holds GPG_*, GITHUB_TOKEN
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+(-[\w.]+)?$/
            branches:
              ignore: /.*/
